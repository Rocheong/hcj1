    <!-- 메인 섹션 -->
    <section class="main">
      <div class="container">
        <h1>웹프로그래밍. Web Progarmming</h1>

        <h3>
          웹 개발자를 위한 온라인 메뉴얼:
          <a href="https://www.w3schools.com/"
            >W3Schools: 웹프로그래밍 메뉴얼</a
          >
        </h3>
        <p>
          웹프로그래밍의 3가지 요소 :
          <a href="https://www.w3schools.com/html/default.asp">HTML5</a> |
          <a href="https://www.w3schools.com/css/default.asp">CSS</a> |
          <a href="https://www.w3schools.com/js/default.asp">JavaScript</a>
        </p>

        <p>현재시간: <span id="time"></span></p>

        <hr />

        <p>
          배경색 바꾸기:
          <button
            onclick="confirmed()"
            onmouseover="showpink()"
            onmouseout="returncolor()"
          >
            Pink
          </button>
          <button
            onclick="confirmed()"
            onmouseover="showlightblue()"
            onmouseout="returncolor()"
          >
            Lightblue
          </button>
          <button
            onclick="confirmed()"
            onmouseover="showyellow()"
            onmouseout="returncolor()"
          >
            Yellow
          </button>
          <button
            onclick="confirmed()"
            onmouseover="showreset()"
            onmouseout="returncolor()"
          >
            Reset
          </button>
        </p>
        <p>
          시간:
          <button onmouseover="timehere()" onmouseout="thide()">
            시스템 설정 시간
          </button>
          <button onmouseover="timekorea()" onmouseout="thide()">서울</button>
          <button onmouseover="timeamerica()" onmouseout="thide()">뉴욕</button>
          <button onmouseover="timechina()" onmouseout="thide()">상하이</button>
          <button onmouseover="timeeurope()" onmouseout="thide()">런던</button>
        </p>
        <p>
          배워봅시다:
          <button onmouseover="showhtml()" onmouseout="hide()">HTML5</button>
          <button onmouseover="showcss3()" onmouseout="hide()">CSS3</button>
          <button onmouseover="showjs()" onmouseout="hide()">Javascript</button>
        </p>
        <hr />
        <div>
          <p id="tdesc"></p>
        </div>
        <br />
        <div>
          <img id="fig" height="200px" />
          <p id="desc"></p>
        </div>
      </div>
    </section>
    <script src="main.js"></script>
